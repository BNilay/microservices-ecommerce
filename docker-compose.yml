version: '3.8'

services:

  customer-service:
    build: ./customer-service/CustomerService
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080

  customer-db:
    image: postgres:16
    container_name: customer-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=customer_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - customer_db_data:/var/lib/postgresql/data

  product-service:
    build: ./product-service/ProductService
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080

  product-db:
    image: postgres:16
    container_name: product-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=product_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - product_db_data:/var/lib/postgresql/data

  order-service:
    build: ./order-service/OrderService
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=order-db;Port=5432;Database=order_db;Username=postgres;Password=postgres
    depends_on:
      - order-db

  order-db:
    image: postgres:16
    container_name: order-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - "5435:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data

  payment-service:
    build: ./payment-service/PaymentService
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080

  api-gateway:
    build: ./api-gateway/ApiGateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080

volumes:
  customer_db_data:
  product_db_data:
  order_db_data: